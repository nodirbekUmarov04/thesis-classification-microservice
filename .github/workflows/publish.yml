name: Build & Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/noise-classification:latest
            ghcr.io/${{ steps.owner.outputs.name }}/noise-classification:${{ github.sha }}

      
      - name: Notify NoiseMap backend
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.NOISEMAP_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/kmsssn/noisemap/dispatches \
            -d '{"event_type":"ml-image-updated","client_payload":{"service":"classification"}}'
